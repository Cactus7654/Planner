{% extends "base.html" %}
{% block title %}Страница входа{% endblock %}
{% block content %}
<h1>Авторизация</h1>
<form action="/login" method="POST" class="col-4">
    <input name="username" class="form-control mb-2" placeholder="Логин">
    <input type="password" name="password" class="form-control mb-2" placeholder="Пароль">
    <button type="submit" class="btn btn-success w-50 mb-2">Войти</button>
    <a href="/register" class="btn btn-secondary w-50">Зарегистрироваться</a>
    {% if error %}
        <div class="alert alert-danger mt-2">{{ error }}</div>
    {% endif %}
</form>
{% endblock %}
